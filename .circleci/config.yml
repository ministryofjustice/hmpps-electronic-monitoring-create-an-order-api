version: 2.1

orbs:
  hmpps: ministryofjustice/hmpps@11.2.0
  docker: circleci/docker@3.0.1

parameters:
  alerts-slack-channel:
    type: string
    default: em-engineers-moj-madetech
  releases-slack-channel:
    type: string
    default: em-engineers-moj-madetech

jobs:
  validate:
    executor:
      name: hmpps/localstack
      jdk_tag: "21.0"
      localstack_tag: "3.0"
      services: "s3,sqs"
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-{{ checksum "build.gradle.kts" }}
            - gradle-
      - run:
          command: ./gradlew check
      - save_cache:
          paths:
            - ~/.gradle
          key: gradle-{{ checksum "build.gradle.kts" }}
      - store_test_results:
          path: build/test-results
      - store_artifacts:
          path: build/reports/tests
workflows:
  version: 2
